// ─── HELPERS ──────────────────────────────────────────────────────────────────
function detectCV(job){
  const t=`${job.location?.display_name||""} ${job.title||""}`.toLowerCase();
  for(const[k,v]of Object.entries(CV_VERSIONS)) if(v.triggers.some(x=>t.includes(x))) return k;
  return "intl";
}
function timeAgo(d){
  const h=(Date.now()-new Date(d).getTime())/3600000;
  if(h<1) return "hace <1h ⚡";
  if(h<24) return `hace ${Math.floor(h)}h`;
  return `hace ${Math.floor(h/24)}d`;
}
function isRecent(d){return(Date.now()-new Date(d).getTime())/3600000<24;}

function computeMatch(job){
  const full=`${job.title||""} ${job.description||""}`.toLowerCase();
  const titleOnly=(job.title||"").toLowerCase();

  // Hard disqualifier: idioma no disponible
  for(const kws of HARD_DISQ) if(kws.some(k=>full.includes(k))) return{tier:"disq",score:0,reasons:["Requiere idioma no disponible"]};

  let score=20; // base score — todos parten con algo

  // ── Título relevante (peso alto) ──
  const titleKeywords=["alliance","partnership","commercial","strategy","revenue","business development","bd manager","channel","distribution"];
  const titleHits=titleKeywords.filter(k=>titleOnly.includes(k));
  score+=titleHits.length*10;

  // ── Skills (expandidas para capturar más variantes) ──
  const expandedSkills=[
    ...CANDIDATE.hardSkills,
    "alliance","partner","strategic","commercial","revenue management",
    "b2b","account management","vendor","stakeholder","negotiat",
    "analytics","reporting","dashboard","bi","business intelligence",
    "product","growth","gtm","go-to-market","crm","salesforce",
  ];
  const sh=[...new Set(expandedSkills.filter(s=>full.includes(s)))];
  score+=Math.min(sh.length*6,30);

  // ── Industria ──
  const expandedIndustries=[...CANDIDATE.industries,"transport","cargo","loyalty","distribution","hospitality","tech","saas","startup"];
  const ih=[...new Set(expandedIndustries.filter(i=>full.includes(i)))];
  score+=Math.min(ih.length*5,15);

  // ── Experiencia requerida ──
  let expNote=null;
  const em=full.match(/(\d+)\+?\s*(?:to\s*\d+\s*)?years?\s*(of\s*)?(experience|exp)/i);
  if(em){
    const req=parseInt(em[1]);
    if(req>CANDIDATE.yearsExperience+3){score-=25;expNote=`Requiere ${req} años (tienes ${CANDIDATE.yearsExperience})`;}
    else if(req>CANDIDATE.yearsExperience){score-=8;expNote=`${req} años requeridos — cerca (tienes ${CANDIDATE.yearsExperience})`;}
    else expNote=`Exp: ${req} años requeridos ✓`;
  }

  // ── Visa / relocation ──
  let visaNote=null;
  const isIntl=!full.includes("chile")&&!full.includes("santiago");
  if(isIntl){
    if(VISA_NEG.some(k=>full.includes(k))){score-=20;visaNote="⚠️ Posible restricción visa";}
    else if(VISA_POS.some(k=>full.includes(k))){score+=10;visaNote="✈️ Visa/relocation friendly";}
  }

  score=Math.max(0,Math.min(100,score));
  const reasons=[];
  if(titleHits.length) reasons.push(`Título relevante: ${titleHits.slice(0,2).join(", ")}`);
  const coreSkills=CANDIDATE.hardSkills.filter(s=>full.includes(s));
  if(coreSkills.length) reasons.push(`Skills clave: ${coreSkills.slice(0,3).join(", ")}`);
  if(ih.length) reasons.push(`Industria: ${ih.slice(0,2).join(", ")}`);
  if(expNote) reasons.push(expNote);
  if(visaNote) reasons.push(visaNote);

  const tier=score>=60?"strong":score>=38?"close":"weak";
  return{tier,score,reasons};
}

function regionMatch(job,rid){
  if(rid==="all") return true;
  const t=`${job.location?.display_name||""} ${job.description||""}`.toLowerCase();
  if(rid==="remote") return t.includes("remote")||t.includes("worldwide")||t.includes("anywhere");
  return REGIONS.find(r=>r.id===rid)?.keywords?.some(k=>t.includes(k))||false;
}

// GetOnBoard — API pública sin key, Chile/LATAM
async function fetchGetOnBoard(query){
  try{
    const terms=[query,"estrategia comercial","alianzas estrategicas","partnerships","gerente comercial","business development latam"];
    const tasks=terms.map(t=>
      fetch("https://www.getonbrd.com/api/v0/search/jobs?query="+encodeURIComponent(t)+"&per_page=10&expand[]=company",{headers:{Accept:"application/json"}})
        .then(r=>r.json())
        .then(d=>(d.data||[]).map(j=>({
          id:"gob_"+j.id,source:"getonboard",
          title:j.attributes?.title||"",
          company:{display_name:j.attributes?.company?.data?.attributes?.name||""},
          location:{display_name:j.attributes?.remote_modality==="full_remote"?"Remote LATAM":"Chile / LATAM"},
          description:(j.attributes?.description||j.attributes?.functions||"").replace(/<[^>]*>/g,"").substring(0,800),
          created:j.attributes?.published_at||new Date().toISOString(),
          redirect_url:"https://www.getonbrd.com/jobs/"+j.id,
          salary_min:j.attributes?.min_salary||null,
          salary_max:j.attributes?.max_salary||null,
        }))).catch(()=>[])
    );
    const all=(await Promise.allSettled(tasks)).flatMap(r=>r.status==="fulfilled"?r.value:[]);
    const seen=new Set();
    return all.filter(j=>{if(!j.title||seen.has(j.id))return false;seen.add(j.id);return true;});
  }catch{return[];}
}

const ADZUNA_COUNTRIES_ALWAYS = ["gb","us","au"];

// ─── API ──────────────────────────────────────────────────────────────────────
async function fetchAdzuna(q,country,id,key){
  try{
    const r=await fetch(`https://api.adzuna.com/v1/api/jobs/${country}/search/1?app_id=${id}&app_key=${key}&results_per_page=15&what=${encodeURIComponent(q)}&sort_by=date`);
    const d=await r.json();
    return(d.results||[]).map(j=>({...j,id:`az_${j.id}_${country}`,source:"adzuna"}));
  }catch{return[];}
}

// Busca en múltiples términos Y múltiples países en paralelo
async function fetchAdzunaMulti(primaryCountry,id,key){
  const countries=primaryCountry==="cl"
    ?["ar","br","es","gb","us"]  // Chile: busca en vecinos + internacionales
    :primaryCountry==="all"
    ?["gb","us","au","ca","es"]  // Global: los 5 más grandes
    :[...new Set([primaryCountry,...ADZUNA_COUNTRIES_ALWAYS])];

  // Toma los primeros 4 términos para no agotar el límite diario (100/día)
  const terms=SEARCH_TERMS.slice(0,4);
  const tasks=[];
  for(const c of countries){
    for(const t of terms){
      tasks.push(fetchAdzuna(t,c,id,key));
    }
  }
  const results=await Promise.allSettled(tasks);
  const all=results.flatMap(r=>r.status==="fulfilled"?r.value:[]);
  // Dedup por título+empresa
  const seen=new Set();
  return all.filter(j=>{
    const key=`${j.title?.toLowerCase().trim()}_${j.company?.display_name?.toLowerCase().trim()}`;
    if(seen.has(key))return false;seen.add(key);return true;
  });
}

async function callClaude(sys,usr){
  try{
    const r=await fetch("https://api.groq.com/openai/v1/chat/completions",{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":`Bearer ${GROQ_KEY}`},
      body:JSON.stringify({
        model:"llama-3.1-8b-instant",
        max_tokens:1000,
        messages:[{role:"system",content:sys},{role:"user",content:usr}]
      })
    });
    const d=await r.json();
    if(d.error) return `Error: ${d.error.message}`;
    return d.choices?.[0]?.message?.content||"Sin respuesta.";
  }catch(e){return `Error: ${e.message}`;}
}

    const cv=detectCV(job);const lang=cv==="cl"?"Spanish":"English";

      sys=`Expert career coach. Write cover letter in ${lang}. Max 280 words. Specific and tailored. Candidate: ${JSON.stringify(CANDIDATE)}`;

        <div style={{background:"linear-gradient(135deg,#0f172a,#1e293b)",padding:"24px 24px 18px",borderRadius:"20px 20px 0 0",color:"white"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>

              {isRecent(job.created)&&<div style={{fontSize:10,fontWeight:800,color:"#93c5fd",letterSpacing:"0.1em",marginBottom:4}}>⚡ PUBLICADO RECIENTEMENTE</div>}
              <h2 style={{margin:"0 0 4px",fontSize:18,fontWeight:800}}>{job.title}</h2>
              <div style={{fontSize:13,color:"#94a3b8"}}>{job.company?.display_name} · {job.location?.display_name}</div>

            </div>
            <button onClick={onClose} style={{background:"rgba(255,255,255,0.1)",border:"none",color:"white",borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:15}}>✕</button>
          </div>
          <div style={{display:"flex",gap:6,marginTop:12,flexWrap:"wrap"}}><MatchBadge m={match}/><SrcBadge s={job.source}/><CVBadge v={cv}/><span style={{fontSize:10,color:"#94a3b8"}}>{timeAgo(job.created)}</span></div>
        </div>
        {match&&match.reasons?.length>0&&(
          <div style={{padding:"14px 24px 0"}}>
            <div style={{background:MATCH_META[match.tier].bg,border:`1px solid ${MATCH_META[match.tier].color}33`,borderRadius:8,padding:"10px 14px"}}>
              <div style={{fontSize:11,fontWeight:800,color:MATCH_META[match.tier].color,marginBottom:5}}>ANÁLISIS DE COMPATIBILIDAD — {MATCH_META[match.tier].icon} {MATCH_META[match.tier].label} {match.tier!=="disq"?`(${match.score}/100)`:""}</div>
              {match.reasons.map((r,i)=><div key={i} style={{fontSize:12,color:"#475569"}}>· {r}</div>)}
            </div>
          </div>
        )}
        <div style={{padding:"12px 24px",borderBottom:"1px solid #f1f5f9",display:"flex",gap:5,flexWrap:"wrap"}}>
          {APP_STATUS.map(s=><button key={s} onClick={()=>onStatus(job.id,s)} style={{fontSize:11,fontWeight:700,padding:"4px 10px",borderRadius:99,border:"none",cursor:"pointer",background:status===s?STATUS_META[s].bg:"#f1f5f9",color:status===s?STATUS_META[s].color:"#94a3b8",outline:status===s?`2px solid ${STATUS_META[s].color}`:"none"}}>{STATUS_META[s].label}</button>)}
        </div>
        <div style={{padding:"12px 24px",borderBottom:"1px solid #f1f5f9",display:"flex",gap:8}}>
          <button onClick={()=>setAi("cv")} style={{flex:1,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",color:"white",border:"none",borderRadius:10,padding:"11px",fontSize:13,fontWeight:700,cursor:"pointer"}}>✦ Optimizar CV</button>
          <button onClick={()=>setAi("cover")} style={{flex:1,background:"linear-gradient(135deg,#0ea5e9,#6366f1)",color:"white",border:"none",borderRadius:10,padding:"11px",fontSize:13,fontWeight:700,cursor:"pointer"}}>✉ Cover Letter</button>
        </div>
        <div style={{padding:"18px 24px"}}>
          <div style={{fontSize:11,fontWeight:700,color:"#94a3b8",letterSpacing:"0.1em",marginBottom:10}}>DESCRIPCIÓN</div>
          <div style={{fontSize:13.5,lineHeight:1.8,color:"#334155",whiteSpace:"pre-wrap"}}>{job.description||"Sin descripción."}</div>
        </div>
        <div style={{padding:"12px 24px 28px",display:"flex",gap:8}}>
          <a href={job.redirect_url} target="_blank" rel="noreferrer" style={{flex:1,background:"#0f172a",color:"white",borderRadius:10,padding:"13px",fontSize:14,fontWeight:700,textDecoration:"none",display:"block",textAlign:"center"}}>Postular ahora →</a>
          <button onClick={()=>onSave(job)} style={{background:saved?"#fef3c7":"#f1f5f9",color:saved?"#b45309":"#64748b",border:"none",borderRadius:10,padding:"13px 16px",fontSize:13,cursor:"pointer",fontWeight:600}}>{saved?"🔖":"🤍"}</button>
        </div>
      </div>
    </div>
    {ai&&<AIPanel job={job} type={ai} onClose={()=>setAi(null)}/>}
  </>);
}

// ─── MAIN ─────────────────────────────────────────────────────────────────────
function App(){
  const[tab,setTab]=useState("search");
  const[query,setQuery]=useState("strategic alliances manager");
  const[country,setCountry]=useState("cl");
  const[jobs,setJobs]=useState(MOCK_JOBS);
  const[loading,setLoading]=useState(false);
  const[sel,setSel]=useState(null);
  const[selMatch,setSelMatch]=useState(null);
  const[saved,setSaved]=useState({});
  const[statuses,setStatuses]=useState({});
  const[alerts,setAlerts]=useState(false);
  const[lastPoll,setLastPoll]=useState(null);
  const[newCount,setNewCount]=useState(0);
  const[appId]=useState("1b9c423b");
  const[appKey]=useState("46b3df50bfda17aa4077d35ab942f857");
  const[sources,setSources]=useState(["remotive","muse","adzuna","getonboard"]);
  const[srcErrors,setSrcErrors]=useState({});
  const[region,setRegion]=useState("all");
  const[matchFilter,setMatchFilter]=useState("all");
  const[hideDisq,setHideDisq]=useState(true);
  const[sortBy,setSortBy]=useState("match");
  const[dateFilter,setDateFilter]=useState("15");
  const[showCfg,setShowCfg]=useState(false);
  const pollRef=useRef(null);
  const prevIds=useRef(new Set());

  const jobsWithMatch=useMemo(()=>jobs.map(j=>({job:j,match:computeMatch(j)})),[jobs]);

  const filtered=useMemo(()=>{
    let list=jobsWithMatch.filter(({job,match})=>{
      if(hideDisq&&match.tier==="disq") return false;
      if(matchFilter!=="all"&&match.tier!==matchFilter) return false;
      if(region!=="all"&&!regionMatch(job,region)) return false;
      if(dateFilter!=="all"){ const days=parseInt(dateFilter); const cutoff=Date.now()-days*86400000; if(new Date(job.created).getTime()<cutoff) return false; }
      return true;
    });
    if(sortBy==="match") list.sort((a,b)=>MATCH_META[a.match.tier].order-MATCH_META[b.match.tier].order||b.match.score-a.match.score);
    else list.sort((a,b)=>new Date(b.job.created)-new Date(a.job.created));
    return list;
  },[jobsWithMatch,hideDisq,matchFilter,region,sortBy]);

  const matchCounts=useMemo(()=>{
    const c={all:0,strong:0,close:0,weak:0};
    jobsWithMatch.forEach(({match})=>{if(match.tier!=="disq"){c.all++;c[match.tier]=(c[match.tier]||0)+1;}});
    return c;
  },[jobsWithMatch]);

  const runSearch=useCallback(async(silent=false)=>{
    if(!silent) setLoading(true);
    const res=[],errs={},tasks=[];
    if(sources.includes("remotive")) tasks.push(fetchRemotive(query).then(r=>res.push(...r)).catch(()=>{errs.remotive="No disponible";}));
    if(sources.includes("muse"))     tasks.push(fetchMuse(query).then(r=>res.push(...r)).catch(()=>{errs.muse="No disponible";}));
    if(sources.includes("getonboard")) tasks.push(fetchGetOnBoard(query).then(r=>res.push(...r)).catch(()=>{errs.getonboard="No disponible";}));
    if(sources.includes("adzuna"))   tasks.push(fetchAdzunaMulti(country,appId,appKey).then(r=>res.push(...r)).catch(()=>{errs.adzuna="Error API";}));
    await Promise.allSettled(tasks);
    setSrcErrors(errs);
    // Dedup global por título+empresa
    const seen=new Set();
    const unique=res.filter(j=>{
      const k=`${(j.title||"").toLowerCase().trim()}_${(j.company?.display_name||"").toLowerCase().trim()}`;
      if(seen.has(k))return false;seen.add(k);return true;
    });
    const sorted=unique.sort((a,b)=>new Date(b.created)-new Date(a.created));
    const final=sorted.length>0?sorted:MOCK_JOBS;
    if(silent){const n=final.filter(j=>!prevIds.current.has(j.id));if(n.length)setNewCount(c=>c+n.length);}
    prevIds.current=new Set(final.map(j=>j.id));
    setJobs(final);setLastPoll(new Date());
    if(!silent) setLoading(false);
  },[query,country,appId,appKey,sources]);

  useEffect(()=>{
    if(alerts) pollRef.current=setInterval(()=>runSearch(true),5*60*1000);
    else clearInterval(pollRef.current);
    return()=>clearInterval(pollRef.current);
  },[alerts,runSearch]);

  const toggleSave=job=>setSaved(p=>{const n={...p};if(n[job.id])delete n[job.id];else n[job.id]=job;return n;});
  const setStatus=(id,s)=>setStatuses(p=>({...p,[id]:s}));
  const openJob=(job,match)=>{setSel(job);setSelMatch(match);};

  const savedList=Object.values(saved);
  const appliedList=Object.entries(statuses).filter(([,s])=>s!=="saved").map(([id])=>saved[id]||jobs.find(j=>j.id===id)).filter(Boolean);
  const srcCount=jobs.reduce((a,j)=>{a[j.source]=(a[j.source]||0)+1;return a;},{});

  const Card=({job,match})=>{
    const cv=detectCV(job);const fresh=isRecent(job.created);const m=MATCH_META[match?.tier||"weak"];
    return(<div onClick={()=>openJob(job,match)} style={{background:"white",border:`1px solid ${fresh?"#bfdbfe":"#e2e8f0"}`,borderLeft:`4px solid ${m.color}`,borderRadius:10,padding:"14px 16px",cursor:"pointer",position:"relative",opacity:match?.tier==="disq"?0.4:1,marginBottom:8,transition:"box-shadow 0.15s"}}
      onMouseEnter={e=>{if(match?.tier!=="disq")e.currentTarget.style.boxShadow="0 4px 18px rgba(0,0,0,0.1)";}}
      onMouseLeave={e=>{e.currentTarget.style.boxShadow="none";}}>
      {fresh&&<div style={{position:"absolute",top:10,right:38,background:"#dbeafe",color:"#1d4ed8",fontSize:9,fontWeight:800,padding:"2px 6px",borderRadius:99}}>⚡ NUEVO</div>}
      <div style={{fontSize:14,fontWeight:700,color:"#0f172a",marginBottom:3,paddingRight:52}}>{job.title}</div>
      <div style={{fontSize:12,color:"#475569",marginBottom:8}}>{job.company?.display_name} · {job.location?.display_name}</div>
      <div style={{display:"flex",gap:5,alignItems:"center",flexWrap:"wrap"}}>
        <MatchBadge m={match}/><SrcBadge s={job.source}/><CVBadge v={cv}/>
        {job.salary_min&&<span style={{fontSize:10,color:"#64748b",fontFamily:"monospace"}}>${(job.salary_min/1000).toFixed(0)}k–${(job.salary_max/1000).toFixed(0)}k</span>}
        <span style={{fontSize:10,color:"#94a3b8",marginLeft:"auto"}}>{timeAgo(job.created)}</span>
        <div onClick={e=>{e.stopPropagation();toggleSave(job);}} style={{fontSize:15,cursor:"pointer",lineHeight:1}}>{saved[job.id]?"🔖":"🤍"}</div>
      </div>
    </div>);
  };

  return(<div style={{minHeight:"100vh",background:"#f8fafc"}}>
    {/* HEADER */}
    <div style={{background:"linear-gradient(135deg,#0f172a,#1e293b)",padding:"18px 18px 0",color:"white"}}>
      <div style={{maxWidth:820,margin:"0 auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
          <div>
            <div style={{fontSize:10,fontWeight:800,color:"#6366f1",letterSpacing:"0.15em",marginBottom:2}}>JOB HUNT DASHBOARD</div>
            <div style={{fontSize:20,fontWeight:800}}>Agustín Preuss</div>
            <div style={{fontSize:11,color:"#94a3b8"}}>Strategic Alliances · Commercial Strategy · Aviation</div>
          </div>
          <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap",justifyContent:"flex-end"}}>
            {newCount>0&&<div style={{background:"#ef4444",color:"white",borderRadius:99,fontSize:10,fontWeight:800,padding:"2px 8px",animation:"pulse 1.5s infinite"}}>+{newCount} nuevos</div>}
            <button onClick={()=>{setAlerts(a=>!a);if(!alerts)runSearch(false);}} style={{background:alerts?"#059669":"rgba(255,255,255,0.1)",border:"none",color:"white",borderRadius:8,padding:"7px 11px",fontSize:11,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:5}}>
              {alerts?<><span style={{width:7,height:7,borderRadius:"50%",background:"#6ee7b7",animation:"pulse 1.5s infinite",display:"inline-block"}}/>ON</>:<>🔔 Alertas</>}
            </button>
            <button onClick={()=>setShowCfg(s=>!s)} style={{background:"rgba(255,255,255,0.1)",border:"none",color:"white",borderRadius:8,padding:"7px 10px",cursor:"pointer",fontSize:14}}>⚙</button>
          </div>
        </div>
        {showCfg&&<div style={{background:"rgba(255,255,255,0.06)",borderRadius:12,padding:14,marginBottom:12,border:"1px solid rgba(255,255,255,0.1)"}}>
          <div style={{fontSize:10,fontWeight:800,color:"#6366f1",marginBottom:8}}>FUENTES ACTIVAS</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {["adzuna","remotive","muse"].map(s=>{const m=SOURCE_META[s];const on=sources.includes(s);return<button key={s} onClick={()=>setSources(p=>p.includes(s)?p.filter(x=>x!==s):[...p,s])} style={{background:on?`${m.color}25`:"rgba(255,255,255,0.07)",color:on?m.color:"#64748b",border:`1px solid ${on?m.color+"44":"transparent"}`,borderRadius:99,fontSize:11,fontWeight:700,padding:"4px 12px",cursor:"pointer"}}>{m.dot} {m.name}</button>;})}
          </div>
          {Object.entries(srcErrors).map(([k,v])=><div key={k} style={{fontSize:10,color:"#f87171",marginTop:6}}>⚠ {k}: {v}</div>)}
        </div>}
        <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap",alignItems:"center"}}>
          <span style={{fontSize:10,fontWeight:700,color:"#475569"}}>FUENTES:</span>
          {["adzuna","remotive","muse"].map(s=>{const m=SOURCE_META[s];const on=sources.includes(s);return<span key={s} style={{background:on?`${m.color}20`:"rgba(255,255,255,0.07)",color:on?m.color:"#64748b",borderRadius:99,fontSize:10,fontWeight:700,padding:"2px 9px"}}>{m.dot} {m.name}</span>;})}
        </div>
        <div style={{display:"flex",gap:6}}>
          <input value={query} onChange={e=>setQuery(e.target.value)} onKeyDown={e=>e.key==="Enter"&&runSearch()} placeholder="cargo, skills, empresa..." style={{flex:1,padding:"10px 13px",borderRadius:"9px 9px 0 0",border:"none",borderBottom:"2px solid #6366f1",background:"rgba(255,255,255,0.08)",color:"white",fontSize:13,outline:"none"}}/>
          <select value={country} onChange={e=>setCountry(e.target.value)} style={{padding:"10px 8px",borderRadius:"9px 9px 0 0",border:"none",borderBottom:"2px solid #6366f1",background:"rgba(255,255,255,0.08)",color:"white",fontSize:12,cursor:"pointer",outline:"none"}}>
            {[["cl","🇨🇱 Chile"],["us","🇺🇸 USA"],["gb","🇬🇧 UK"],["au","🇦🇺 Australia"],["ca","🇨🇦 Canada"],["de","🇩🇪 Germany"],["es","🇪🇸 Spain"],["br","🇧🇷 Brazil"],["all","🌐 Global"]].map(([c,n])=><option key={c} value={c} style={{background:"#1e293b"}}>{n}</option>)}
          </select>
          <button onClick={()=>runSearch()} disabled={loading} style={{background:"#6366f1",color:"white",border:"none",borderRadius:"9px 9px 0 0",padding:"10px 16px",fontSize:13,fontWeight:700,cursor:"pointer",minWidth:65}}>
            {loading?<span style={{display:"inline-block",width:13,height:13,borderRadius:"50%",border:"2px solid rgba(255,255,255,0.3)",borderTopColor:"white",animation:"spin 0.7s linear infinite"}}/>:"Buscar"}
          </button>
        </div>
        <div style={{display:"flex",gap:0}}>
          {[["search","🔍","Buscar"],["saved",`🔖 Guardados${savedList.length?` (${savedList.length})`:""}`,`🔖 Guardados${savedList.length?` (${savedList.length})`:""}`],["tracker",`📊 Tracker${appliedList.length?` (${appliedList.length})`:""}`,""]].map(([id,icon,lbl])=>{
            const label=id==="search"?"🔍 Buscar":id==="saved"?`🔖 Guardados${savedList.length?` (${savedList.length})`:""}`:`📊 Tracker${appliedList.length?` (${appliedList.length})`:""}`; 
            return<button key={id} onClick={()=>setTab(id)} style={{background:tab===id?"white":"transparent",color:tab===id?"#0f172a":"#94a3b8",border:"none",padding:"9px 14px",cursor:"pointer",fontSize:12,fontWeight:tab===id?700:500,borderRadius:"8px 8px 0 0"}}>{label}</button>;
          })}
          {lastPoll&&<div style={{marginLeft:"auto",padding:"9px 12px",fontSize:10,color:alerts?"#6ee7b7":"#475569",alignSelf:"center"}}>{alerts?"⟳ ":""}{lastPoll.toLocaleTimeString("es-CL",{hour:"2-digit",minute:"2-digit"})}</div>}
        </div>
      </div>
    </div>

    {/* CONTENT */}
    <div style={{maxWidth:820,margin:"0 auto",padding:"16px 12px"}}>
      {tab==="search"&&<>
        {/* Filters */}
        <div style={{background:"white",border:"1px solid #e2e8f0",borderRadius:12,padding:"14px 16px",marginBottom:14}}>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:10,fontWeight:800,color:"#94a3b8",letterSpacing:"0.1em",marginBottom:7}}>REGIÓN</div>
            <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
              {REGIONS.map(r=><button key={r.id} onClick={()=>setRegion(r.id)} style={{background:region===r.id?"#0f172a":"#f8fafc",color:region===r.id?"white":"#475569",border:`1px solid ${region===r.id?"#0f172a":"#e2e8f0"}`,borderRadius:99,fontSize:11,fontWeight:600,padding:"5px 12px",cursor:"pointer"}}>{r.icon} {r.label}</button>)}
            </div>
          </div>
          <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-start"}}>
            <div>
              <div style={{fontSize:10,fontWeight:800,color:"#94a3b8",letterSpacing:"0.1em",marginBottom:7}}>COMPATIBILIDAD</div>
              <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                {[["all","Todos","#475569"],["strong","✅ Fuerte","#059669"],["close","🔶 Cerca","#d97706"],["weak","⬜ Bajo","#94a3b8"]].map(([id,label,color])=><button key={id} onClick={()=>setMatchFilter(id)} style={{background:matchFilter===id?`${color}18`:"#f8fafc",color:matchFilter===id?color:"#94a3b8",border:`1px solid ${matchFilter===id?color+"44":"#e2e8f0"}`,borderRadius:99,fontSize:11,fontWeight:700,padding:"4px 11px",cursor:"pointer"}}>{label} {matchCounts[id]!==undefined?`(${matchCounts[id]})`:""}</button>)}
              </div>
            </div>
            <div>
              <div style={{fontSize:10,fontWeight:800,color:"#94a3b8",letterSpacing:"0.1em",marginBottom:7}}>📅 ANTIGÜEDAD</div>
              <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                {[["1","Hoy"],["7","7 días"],["15","15 días"],["30","30 días"],["all","Todo"]].map(([v,l])=><button key={v} onClick={()=>setDateFilter(v)} style={{fontSize:11,fontWeight:700,padding:"4px 11px",borderRadius:99,border:"none",cursor:"pointer",background:dateFilter===v?"#0f172a":"#f1f5f9",color:dateFilter===v?"white":"#64748b",transition:"all 0.15s"}}>{l}</button>)}
              </div>
            </div>
            <div style={{marginLeft:"auto",display:"flex",flexDirection:"column",gap:7}}>
              <label style={{display:"flex",alignItems:"center",gap:6,fontSize:11,color:"#475569",cursor:"pointer"}}><input type="checkbox" checked={hideDisq} onChange={e=>setHideDisq(e.target.checked)} style={{accentColor:"#6366f1"}}/>Ocultar descartados</label>
              <div style={{display:"flex",gap:5,alignItems:"center"}}>
                <span style={{fontSize:10,color:"#94a3b8",fontWeight:700}}>ORDEN:</span>
                {[["match","Match"],["date","Fecha"]].map(([v,l])=><button key={v} onClick={()=>setSortBy(v)} style={{fontSize:10,fontWeight:700,padding:"3px 9px",borderRadius:99,border:"none",cursor:"pointer",background:sortBy===v?"#0f172a":"#f1f5f9",color:sortBy===v?"white":"#64748b"}}>{l}</button>)}
              </div>
            </div>
          </div>
        </div>
        <div style={{display:"flex",gap:7,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
          <span style={{fontSize:12,color:"#94a3b8"}}>{filtered.length} trabajos</span>
          {Object.entries(srcCount).map(([s,c])=><span key={s} style={{background:"white",border:"1px solid #e2e8f0",borderRadius:99,padding:"2px 10px",fontSize:10,fontWeight:600,color:SOURCE_META[s]?.color||"#64748b"}}>{SOURCE_META[s]?.dot} {c} {SOURCE_META[s]?.name}</span>)}
        </div>
        {jobs[0]?.source==="demo"&&<div style={{background:"#fef3c7",border:"1px solid #fde68a",borderRadius:10,padding:"10px 14px",marginBottom:12,fontSize:12,color:"#92400e"}}>💡 Datos demo — haz click en <strong>Buscar</strong> para resultados reales</div>}
        {filtered.length===0&&<div style={{textAlign:"center",padding:"50px 0",color:"#94a3b8"}}><div style={{fontSize:32,marginBottom:8}}>🔍</div>Sin resultados con estos filtros</div>}
        {filtered.map(({job,match})=><Card key={job.id} job={job} match={match}/>)}
      </>}

      {tab==="saved"&&(savedList.length===0
        ?<div style={{textAlign:"center",padding:"60px 0",color:"#94a3b8"}}><div style={{fontSize:36,marginBottom:10}}>🔖</div>Sin trabajos guardados</div>
        :savedList.map(job=><Card key={job.id} job={job} match={computeMatch(job)}/>)
      )}

      {tab==="tracker"&&(appliedList.length===0
        ?<div style={{textAlign:"center",padding:"60px 0",color:"#94a3b8"}}><div style={{fontSize:36,marginBottom:10}}>📊</div><div style={{fontSize:14}}>Sin postulaciones trackeadas</div><div style={{fontSize:12,marginTop:4}}>Abre un trabajo y cambia su estado</div></div>
        :APP_STATUS.filter(s=>s!=="saved").map(status=>{
          const inS=Object.entries(statuses).filter(([,s])=>s===status).map(([id])=>saved[id]||jobs.find(j=>j.id===id)).filter(Boolean);
          if(!inS.length) return null;
          const sm=STATUS_META[status];
          return<div key={status} style={{marginBottom:20}}>
            <div style={{fontSize:11,fontWeight:800,letterSpacing:"0.08em",color:sm.color,marginBottom:7}}>{sm.label.toUpperCase()} ({inS.length})</div>
            {inS.map(job=>{const m=computeMatch(job);return<div key={job.id} onClick={()=>openJob(job,m)} style={{background:sm.bg,border:`1px solid ${sm.color}33`,borderLeft:`4px solid ${sm.color}`,borderRadius:10,padding:"12px 14px",cursor:"pointer",marginBottom:7}}>
              <div style={{fontSize:13,fontWeight:700}}>{job.title}</div>
              <div style={{fontSize:11,color:"#475569",marginTop:2}}>{job.company?.display_name} · {job.location?.display_name}</div>
              <div style={{display:"flex",gap:5,marginTop:6}}><MatchBadge m={m}/><SrcBadge s={job.source}/><span style={{fontSize:10,color:"#64748b"}}>{timeAgo(job.created)}</span></div>
            </div>;})}
          </div>;
        })
      )}
    </div>

    {sel&&<JobModal job={sel} match={selMatch} onClose={()=>setSel(null)} onStatus={setStatus} status={statuses[sel.id]} onSave={toggleSave} saved={!!saved[sel.id]}/>}
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
